name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ── Unit tests — no BPF, no root, runs on every push ──────────────────────────
jobs:
  unit-tests:
    name: Unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gcc clang llvm \
            libbpf-dev libelf-dev zlib1g-dev \
            libssl-dev \
            python3

      - name: Unit tests (normal)
        run: make test

      - name: Unit tests (ASAN / UBSan)
        run: make test-asan

# ── Integration tests — needs BTF-enabled kernel + root ───────────────────────
  integration-tests:
    name: Integration tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            required: true
          # ubuntu-22.04 ships libbpf 0.5.x / kernel 5.15; some newer BPF
          # map types and helpers may not load cleanly on that combination.
          # Keep the job for visibility but don't block CI on it.
          - os: ubuntu-22.04
            required: false
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ !matrix.required }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install build + BPF dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gcc clang llvm \
            libbpf-dev libelf-dev zlib1g-dev \
            libssl-dev \
            linux-tools-common linux-tools-generic \
            python3 strace

      - name: Locate bpftool
        id: bpftool
        run: |
          # Try version-specific package first (most reliable on GH Actions)
          sudo apt-get install -y --no-install-recommends \
            linux-tools-$(uname -r) 2>/dev/null || true

          # Find a working bpftool binary (skip wrapper scripts that exit non-zero)
          BPFTOOL=""
          for candidate in $(find /usr/lib/linux-tools -name bpftool 2>/dev/null | sort -t- -k1,1V); do
            if "$candidate" version >/dev/null 2>&1; then
              BPFTOOL="$candidate"
            fi
          done
          if [ -z "$BPFTOOL" ]; then
            echo "No working bpftool for kernel $(uname -r) — skipping integration tests"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sudo ln -sf "$BPFTOOL" /usr/local/bin/bpftool
          bpftool version
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Verify BTF support
        if: steps.bpftool.outputs.found == 'true'
        run: |
          ls /sys/kernel/btf/vmlinux || \
            (echo "BTF not available on this kernel — skipping" && exit 0)

      - name: Build argus
        if: steps.bpftool.outputs.found == 'true'
        run: make

      - name: Integration tests
        if: steps.bpftool.outputs.found == 'true'
        run: make test-integration
