name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # needed to create GitHub releases and upload assets

jobs:
  build-and-release:
    name: Build & publish release
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Install build & packaging dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gcc clang llvm \
            libbpf-dev libelf-dev zlib1g-dev \
            libssl-dev libsqlite3-dev pkg-config \
            linux-tools-common linux-tools-generic \
            dpkg-dev

      - name: Locate bpftool
        run: |
          sudo apt-get install -y linux-tools-$(uname -r) 2>/dev/null || true
          BPFTOOL=""
          for c in $(find /usr/lib/linux-tools -name bpftool 2>/dev/null | sort -t- -k1,1V); do
            if "$c" version >/dev/null 2>&1; then BPFTOOL="$c"; fi
          done
          if [ -n "$BPFTOOL" ]; then
            sudo ln -sf "$BPFTOOL" /usr/local/bin/bpftool
            echo "bpftool: $(bpftool version)"
          else
            echo "::error::No working bpftool found for kernel $(uname -r)"
            exit 1
          fi

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.4.0
          VER="${TAG#v}"                     # strip leading v → 0.4.0
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          # Verify it matches the in-source version
          SRC_VER=$(grep 'ARGUS_VERSION' src/argus.h | sed 's/.*"\(.*\)".*/\1/')
          if [ "$SRC_VER" != "$VER" ]; then
            echo "::error::Tag $TAG does not match ARGUS_VERSION '$SRC_VER' in src/argus.h"
            exit 1
          fi

      - name: Build argus & argus-server
        run: make argus argus-server

      - name: Run unit tests (sanity check before release)
        run: |
          make tests/test_lineage tests/test_output tests/test_rules \
               tests/test_forward tests/test_baseline tests/test_metrics \
               tests/test_fim tests/test_netcorr tests/test_enterprise
          make test-unit

      - name: Build .deb package
        run: make deb

      - name: Build man page
        run: make man

      - name: Collect release artifacts
        run: |
          mkdir -p dist
          cp argus_*.deb dist/
          # Standalone binaries (useful for container installs)
          cp argus      dist/argus-${{ steps.version.outputs.version }}-linux-$(uname -m)
          cp argus-server dist/argus-server-${{ steps.version.outputs.version }}-linux-$(uname -m)
          ls -lh dist/

      - name: Generate release notes
        id: notes
        run: |
          # Extract the section for this version from CHANGELOG or README
          NOTES=$(awk "/## ${{ steps.version.outputs.version }}/{found=1; next} found && /^## /{exit} found{print}" README.md 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            NOTES="See commit history for changes in this release."
          fi
          # Write to a file to avoid shell quoting issues
          printf '%s\n' "$NOTES" > dist/release-notes.md
          echo "Release notes:"
          cat dist/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "argus ${{ steps.version.outputs.tag }}"
          body_path: dist/release-notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            dist/argus_*.deb
            dist/argus-${{ steps.version.outputs.version }}-linux-*
            dist/argus-server-${{ steps.version.outputs.version }}-linux-*
